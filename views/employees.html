<h2>Employee List</h2>

<input type="text"
       ng-model="searchText"
       placeholder="Search Employee">

<br><br>

<table border="1" width="100%">

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Department</th>
        <th>Salary</th>
    </tr>

    <tr ng-repeat="emp in employees | filter:searchText">

        <td>{{ emp.id }}</td>
        <td>{{ emp.name }}</td>
        <td>{{ emp.department }}</td>
        <td>{{ emp.salary }}</td>

    </tr>

</table>

<hr>

<h3>Add Employee</h3>

<form ng-submit="addEmployee()">

    <input type="text"
           ng-model="newEmployee.name"
           placeholder="Name"
           required>

    <input type="text"
           ng-model="newEmployee.department"
           placeholder="Department"
           required>

    <input type="number"
           ng-model="newEmployee.salary"
           placeholder="Salary"
           required>

    <button type="submit">
        Add Employee
    </button>

</form>
